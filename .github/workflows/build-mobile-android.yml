name: Build Mobile Android

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'mobile/android/**'
      - '.github/workflows/build-mobile-android.yml'
  pull_request:
    paths:
      - 'mobile/android/**'
      - '.github/workflows/build-mobile-android.yml'

permissions:
  contents: read

defaults:
  run:
    working-directory: mobile/android

jobs:
  build:
    name: Android Debug Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: oracle
          java-version: '21'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --no-daemon

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mobile-android-debug-apk
          path: mobile/android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
