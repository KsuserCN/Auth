# Keep Spring Boot integration tests self-contained in CI by using
# an in-memory database instead of the production MySQL settings.
spring.datasource.url=jdbc:h2:mem:auth-test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

jwt.secret=ksuser-very-secret-key-2026-abc
jwt.access-token-expiration=900000
jwt.refresh-token-expiration=604800000

spring.mail.host=localhost
spring.mail.port=2525
spring.mail.username=test@example.com
spring.mail.password=test-password
