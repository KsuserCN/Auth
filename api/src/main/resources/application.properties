# Basic
spring.application.name=auth
server.port=8000
app.debug=${DEBUG:false}

# Mysql
spring.datasource.url=${DB_URL:}
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME:}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# Redis
spring.data.redis.host=${REDIS_HOST:127.0.0.1}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.timeout=5000

# JWT
jwt.secret=${JWT_SECRET:ksuser-very-secret-key-2026-abc}
jwt.access-token-expiration=${JWT_ACCESS_TOKEN_EXPIRATION:900000}
jwt.refresh-token-expiration=${JWT_REFRESH_TOKEN_EXPIRATION:604800000}

# SMTP
spring.mail.host=${MAIL_HOST:smtp.exmail.qq.com}
spring.mail.port=${MAIL_PORT:465}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.socketFactory.fallback=false
spring.mail.default-encoding=UTF-8

# Log
logging.level.root=INFO
logging.level.cn.ksuser.api=DEBUG

# 速率限制配置（验证码发送）
app.rate-limit.send-code-email-per-minute=1
app.rate-limit.send-code-email-per-hour=14
app.rate-limit.send-code-ip-per-minute=3
app.rate-limit.send-code-ip-per-hour=14

# 速率限制配置（密码登录）
app.rate-limit.login-email-per-minute=5
app.rate-limit.login-email-per-hour=60
app.rate-limit.login-ip-per-minute=10
app.rate-limit.login-ip-per-hour=120

# 密码策略
app.password.min-length=6
app.password.max-length=66
app.password.require-uppercase=false
app.password.require-lowercase=false
app.password.require-digits=true
app.password.require-special-chars=false

# Token 配置
app.token.blacklist-enabled=true
app.token.refresh-rotation-enabled=true

# 敏感操作配置
app.sensitive-operation.verification-duration-minutes=15
app.sensitive-operation.require-ip-match=true

# 安全 Header
server.servlet.session.cookie.http-only=true
## 开发环境跨域 HTTP 使用 Lax，前后端跨域但在同一本地机器
server.servlet.session.cookie.secure=false
server.servlet.session.cookie.same-site=lax
server.forward-headers-strategy=framework

# 请求大小限制
server.tomcat.max-http-form-post-size=4194304
spring.servlet.multipart.max-file-size=3MB
spring.servlet.multipart.max-request-size=4MB

app.qq.oauth.app-id=1903286823
app.qq.oauth.app-key=a6SffXHtMdjeU9dw
app.qq.oauth.redirect-uris[0]=https://auth.ksuser.cn/oauth/qq/callback

# GitHub OAuth 配置
app.github.oauth.app-id=${GITHUB_OAUTH_CLIENT_ID:}
app.github.oauth.app-key=${GITHUB_OAUTH_CLIENT_SECRET:}
app.github.oauth.redirect-uris[0]=https://auth.ksuser.cn/oauth/github/callback

# Microsoft OAuth 配置
app.microsoft.oauth.app-id=${MICROSOFT_OAUTH_CLIENT_ID:}
app.microsoft.oauth.app-key=${MICROSOFT_OAUTH_CLIENT_SECRET:}
app.microsoft.oauth.tenant-id=${MICROSOFT_OAUTH_TENANT_ID:consumers}
app.microsoft.oauth.redirect-uris[0]=https://auth.ksuser.cn/oauth/microsoft/callback

# Google OAuth 配置
app.google.oauth.app-id=${GOOGLE_OAUTH_CLIENT_ID:}
app.google.oauth.app-key=${GOOGLE_OAUTH_CLIENT_SECRET:}
app.google.oauth.redirect-uris[0]=https://auth.ksuser.cn/oauth/google/callback

# Open Platform OAuth2 配置
app.oauth2.max-apps-per-user=5
app.oauth2.authorization-code-expiration-seconds=300
app.oauth2.access-token-expiration-seconds=7200

# Mobile bridge 配置
app.mobile-bridge.app-link-origin=${APP_MOBILE_BRIDGE_APP_LINK_ORIGIN:https://auth.ksuser.cn}
app.mobile-bridge.allowed-return-origins=${APP_MOBILE_BRIDGE_ALLOWED_RETURN_ORIGINS:http://localhost:5173,https://auth.ksuser.cn,https://www.ksuser.cn}

# Internal SSO 配置
app.sso.max-clients=20
app.sso.authorization-code-expiration-seconds=300
app.sso.access-token-expiration-seconds=7200
app.sso.issuer=${APP_SSO_ISSUER:http://localhost:8000}
app.sso.authorization-endpoint=${APP_SSO_AUTHORIZATION_ENDPOINT:http://localhost:5173/sso/authorize}
app.oidc.issuer=${APP_OIDC_ISSUER:${APP_SSO_ISSUER:http://localhost:8000}}

# Passkey (WebAuthn) 配置
app.passkey.rp-name=Ksuser Auth
app.passkey.rp-id=${PASSKEY_RP_ID:localhost}
app.passkey.origin=${PASSKEY_ORIGIN:http://localhost:5173}
app.passkey.android-origins=${PASSKEY_ANDROID_ORIGINS:}
app.passkey.android-cert-sha256-fingerprints=${PASSKEY_ANDROID_CERT_SHA256_FINGERPRINTS:92:4D:95:F0:A6:40:57:32:91:E9:A8:83:91:ED:85:52:E4:2A:4A:B5:98:43:12:F7:FA:75:53:70:5F:34:0F:AB}
app.passkey.attestation=none
app.passkey.user-verification=preferred
app.passkey.resident-key=preferred
app.passkey.timeout=300000
