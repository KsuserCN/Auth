name: Build Desktop

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: macOS Release Build
            platform: macos
            artifact_name: ksuser-auth-desktop-macos
          - os: windows-latest
            label: Windows Release Build
            platform: windows
            artifact_name: ksuser-auth-desktop-windows-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable desktop platform
        run: flutter config --enable-${{ matrix.platform }}-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build macOS
        if: matrix.platform == 'macos'
        run: flutter build macos --release

      - name: Archive macOS app
        if: matrix.platform == 'macos'
        run: |
          APP_PATH="$(find build/macos/Build/Products/Release -maxdepth 1 -name '*.app' -print -quit)"
          if [ -z "$APP_PATH" ]; then
            echo "No macOS app bundle found under build/macos/Build/Products/Release"
            exit 1
          fi
          ditto -c -k --sequesterRsrc --keepParent \
            "$APP_PATH" \
            "${{ matrix.artifact_name }}.zip"

      - name: Build Windows
        if: matrix.platform == 'windows'
        run: flutter build windows --release

      - name: Archive Windows app
        if: matrix.platform == 'windows'
        shell: pwsh
        run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath "${{ matrix.artifact_name }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}.zip
          if-no-files-found: error
